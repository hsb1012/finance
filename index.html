<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b14;--surface:#13131e;--surface2:#1a1a28;--border:rgba(255,255,255,0.08);
  --gold:#c8a96e;--blue:#7eb8f7;--green:#6ee7b7;--red:#f87171;--purple:#a78bfa;
  --text:#e2e2f0;--text2:#8888aa;--text3:#44445a;
}

/* ── Layout: full screen on mobile, phone frame on desktop ── */
html, body { height:100%; background:#1a1a2e; }

.phone-wrap {
  display:flex; justify-content:center; align-items:flex-start;
  min-height:100vh; padding:20px;
}
@media (max-width: 430px) {
  .phone-wrap { padding:0; align-items:stretch; background:var(--bg); }
  .phone { border-radius:0 !important; border:none !important; box-shadow:none !important; width:100% !important; height:100vh !important; max-height:none !important; }
  .notch { display:none !important; }
}

.phone{
  width:375px; height:820px; background:var(--bg);
  border-radius:50px; border:10px solid #1c1c2e;
  box-shadow:0 0 0 1px #2a2a3e, 0 30px 90px rgba(0,0,0,0.8);
  overflow:hidden; position:relative; flex-shrink:0;
  display:flex; flex-direction:column;
}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#1c1c2e;border-radius:0 0 18px 18px;z-index:100}
.statusbar{height:44px;display:flex;justify-content:space-between;align-items:flex-end;padding:0 26px 6px;position:relative;z-index:10;flex-shrink:0;background:var(--bg)}
.st{font-size:15px;font-weight:600;color:var(--text)}.si{font-size:12px;color:var(--text2)}

.page{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s}
.page.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.page.out{transform:translateX(-28%);opacity:0;pointer-events:none}
.subscreen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;background:var(--bg)}
.subscreen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.subscreen.out{transform:translateX(-28%);opacity:0;pointer-events:none}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:90px}
.scroll::-webkit-scrollbar{display:none}

/* ── Auth screen ── */
.auth-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px}
.auth-logo{font-size:52px;margin-bottom:16px}
.auth-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center}
.auth-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:32px;line-height:1.5}
.auth-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-size:16px;color:var(--text);outline:none;font-family:inherit;margin-bottom:12px;transition:border-color .2s}
.auth-input:focus{border-color:rgba(200,169,110,0.5)}
.auth-btn{width:100%;background:linear-gradient(135deg,#c8a96e,#b8943e);border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:700;color:#000;cursor:pointer;margin-bottom:12px;font-family:inherit;transition:opacity .2s}
.auth-btn:active{opacity:.85}
.auth-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:8px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-divider span{font-size:12px;color:var(--text3)}
.auth-error{font-size:12px;color:var(--red);text-align:center;margin-top:4px;min-height:18px}
.auth-mode-link{font-size:13px;color:var(--blue);text-align:center;cursor:pointer;margin-top:8px}

/* ── Sync indicator ── */
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 18px;background:rgba(110,231,183,0.05);border-bottom:1px solid rgba(110,231,183,0.08);font-size:11px;color:var(--text2)}
.sync-info{display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.syncing{animation:spin .8s linear infinite;border-radius:0;background:none;border:2px solid var(--blue);border-top-color:transparent}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Common ── */
.nav-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 8px}
.nav-left{display:flex;align-items:center;gap:10px}
.back-btn{width:32px;height:32px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2)}
.nav-title{font-size:17px;font-weight:700;color:var(--text)}
.add-ico-btn{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.add-ico-btn.gold{background:rgba(200,169,110,0.12);border:1px solid rgba(200,169,110,0.25);color:var(--gold)}
.add-ico-btn.blue{background:rgba(126,184,247,0.12);border:1px solid rgba(126,184,247,0.25);color:var(--blue)}
.add-ico-btn.red{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.25);color:var(--red)}

.section{padding:0 18px;margin-bottom:14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:600;color:var(--text)}
.sec-right{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.card-row:last-child{border:none}
.cr-lbl{font-size:13px;color:var(--text2)}.cr-val{font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;font-weight:500}
.cr-val.pos{color:var(--green)}.cr-val.neg{color:var(--red)}.cr-val.gold{color:var(--gold)}

.exp-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.exp-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;user-select:none}
.exp-hdr:active{background:rgba(255,255,255,0.025)}
.exp-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.chip{font-size:9px;color:var(--text3);background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:5px;padding:1px 5px}
.exp-sub{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-amt{text-align:right;flex-shrink:0}
.exp-val{font-size:14px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.exp-twd{font-size:10px;color:var(--text2);margin-top:2px;font-variant-numeric:tabular-nums}
.exp-detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.exp-detail.open{max-height:280px}
.exp-detail-inner{padding:10px 14px;border-top:1px solid var(--border)}
.dr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.dr:last-child{border:none}
.dl{font-size:12px;color:var(--text2)}.dv{font-size:12px;color:var(--text);font-variant-numeric:tabular-nums}
.dv.pos{color:var(--green)}.dv.neg{color:var(--red)}.dv.gold{color:var(--gold)}

.sbadge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:7px;margin-top:3px;font-variant-numeric:tabular-nums}
.sbadge.up{background:rgba(110,231,183,0.12);border:1px solid rgba(110,231,183,0.25);color:var(--green)}
.sbadge.dn{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.25);color:var(--red)}
.hbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.hbadge.up{background:rgba(110,231,183,0.12);border:1px solid rgba(110,231,183,0.28);color:var(--green)}
.hbadge.dn{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.28);color:var(--red)}
.hbadge.neu{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text2)}

.add-row{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.1);border-radius:12px;margin-top:4px;cursor:pointer;font-size:12px;color:var(--text3);transition:all .2s}
.divider{height:1px;background:var(--border);margin:2px 18px 14px}
.form-sec{padding:0 18px;margin-bottom:14px}
.form-lbl{font-size:12px;color:var(--text2);margin-bottom:8px;letter-spacing:.3px}
.form-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-size:15px;color:var(--text);outline:none;font-family:inherit;font-variant-numeric:tabular-nums;transition:border-color .2s}
.form-input:focus{border-color:rgba(200,169,110,0.5)}
.form-input.blue:focus{border-color:rgba(126,184,247,0.5)}
.form-input.red:focus{border-color:rgba(248,113,113,0.5)}
.form-row{display:flex;gap:8px}
.form-row .form-input{flex:1}
.input-unit{width:42px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0}
.opts-row{display:flex;gap:8px;flex-wrap:wrap}
.opt-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0}
.opt-btn.sel-gold{border-color:var(--gold);background:rgba(200,169,110,0.1);color:var(--gold);font-weight:600}
.opt-btn.sel-blue{border-color:var(--blue);background:rgba(126,184,247,0.1);color:var(--blue);font-weight:600}
.opt-btn.sel-red{border-color:var(--red);background:rgba(248,113,113,0.1);color:var(--red);font-weight:600}
.opt-btn:active{transform:scale(.97)}
.submit-btn{display:block;width:calc(100% - 36px);margin:0 18px 8px;border-radius:16px;padding:15px;text-align:center;cursor:pointer;font-size:15px;font-weight:700;border:none;transition:opacity .2s;font-family:inherit}
.submit-btn.gold{background:linear-gradient(135deg,#c8a96e,#b8943e);color:#000}
.submit-btn.blue{background:linear-gradient(135deg,#7eb8f7,#5a9adf);color:#000}
.submit-btn.red{background:linear-gradient(135deg,#f87171,#c84b4b);color:#fff}
.submit-btn:active{opacity:.85}
.preview-box{border-radius:14px;padding:14px 16px;margin:0 18px 14px}
.preview-box.gold{background:rgba(200,169,110,0.05);border:1px solid rgba(200,169,110,0.2)}
.preview-box.blue{background:rgba(126,184,247,0.05);border:1px solid rgba(126,184,247,0.15)}
.preview-box.red{background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.15)}
.pb-title{font-size:11px;color:var(--text3);letter-spacing:.5px;margin-bottom:10px}
.pb-row{display:flex;justify-content:space-between;padding:4px 0}
.pb-lbl{font-size:12px;color:var(--text2)}.pb-val{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.pb-divider{height:1px;background:rgba(255,255,255,0.05);margin:8px 0}

.succ-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.succ-circle{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:20px;animation:pop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.succ-circle.gold{background:rgba(200,169,110,0.12);border:2px solid rgba(200,169,110,0.3)}
.succ-circle.blue{background:rgba(126,184,247,0.12);border:2px solid rgba(126,184,247,0.3)}
.succ-circle.red{background:rgba(248,113,113,0.12);border:2px solid rgba(248,113,113,0.3)}
.succ-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.succ-sub{font-size:14px;color:var(--text2);line-height:1.55}
.succ-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-top:22px;width:100%;text-align:left}
.scr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.scr:last-child{border:none}
.scl{font-size:12px;color:var(--text2)}.scv{font-size:12px;color:var(--text);font-variant-numeric:tabular-nums}
.ghost-btn{width:100%;margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:13px;text-align:center;cursor:pointer;font-size:14px;color:var(--text2)}
.ghost-btn.gold{background:rgba(200,169,110,0.08);border-color:rgba(200,169,110,0.2);color:var(--gold)}
.ghost-btn.blue{background:rgba(126,184,247,0.08);border-color:rgba(126,184,247,0.2);color:var(--blue)}

.update-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;background:rgba(126,184,247,0.04);border-bottom:1px solid rgba(126,184,247,0.08)}
.update-info{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.refresh-btn{font-size:11px;color:var(--blue);background:rgba(126,184,247,0.1);border:1px solid rgba(126,184,247,0.2);padding:4px 10px;border-radius:10px;cursor:pointer;white-space:nowrap}

.rates{display:flex;margin:12px 18px 0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.rate-item{flex:1;padding:10px 0;text-align:center;position:relative}
.rate-item:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;height:60%;width:1px;background:var(--border)}
.rate-cur{font-size:9px;color:var(--text3);letter-spacing:.5px}
.rate-val{font-size:15px;font-weight:600;color:var(--text);margin:2px 0;font-variant-numeric:tabular-nums}
.rate-chg{font-size:10px}

.alloc-card{display:flex;gap:14px;align-items:center;margin:14px 18px 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}
.donut-wrap{flex-shrink:0;position:relative}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.legend-item{display:flex;align-items:center;gap:8px;padding:3px 0}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-name{font-size:12px;color:var(--text2);flex:1}
.legend-pct{font-size:12px;color:var(--text);font-variant-numeric:tabular-nums}

.prog-bar{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}

.htabs-scroll{overflow-x:auto;scrollbar-width:none;padding:10px 18px 12px}
.htabs-scroll::-webkit-scrollbar{display:none}
.htabs{display:flex;gap:8px;width:max-content}
.htab{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;cursor:pointer;flex-shrink:0;min-width:100px;transition:all .2s}
.htab:active{transform:scale(.97)}
.htab-num{font-size:10px;color:var(--text3);margin-bottom:3px}
.htab-name{font-size:13px;font-weight:600;color:var(--text)}
.htab-val{font-size:11px;color:var(--text2);margin-top:2px;font-variant-numeric:tabular-nums}
.htab.sel-gold{border-color:var(--gold);background:rgba(200,169,110,0.08)}.htab.sel-gold .htab-name{color:var(--gold)}
.htab.sel-blue{border-color:var(--blue);background:rgba(126,184,247,0.07)}.htab.sel-blue .htab-name{color:var(--blue)}
.htab.sel-red{border-color:var(--red);background:rgba(248,113,113,0.08)}.htab.sel-red .htab-name{color:var(--red)}
.htab-add{background:var(--surface);border:1.5px dashed rgba(255,255,255,0.1);border-radius:14px;padding:10px 16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;min-width:60px;color:var(--text3);font-size:14px}

.spark-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px}
.spark-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.spark-title{font-size:12px;color:var(--text2)}
.spark-range{display:flex;gap:5px}
.spark-btn{font-size:10px;color:var(--text3);padding:2px 8px;border-radius:8px;cursor:pointer;background:var(--surface2);border:1px solid var(--border)}
.spark-btn.active{background:rgba(126,184,247,0.12);border-color:rgba(126,184,247,0.3);color:var(--blue)}

.hero-card{margin:0 18px 14px;border-radius:20px;padding:20px;position:relative;overflow:hidden;border:1px solid}
.mort-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid rgba(255,255,255,0.06);margin-top:14px}
.ms-cell{padding:11px 0;text-align:center;position:relative}
.ms-cell:not(:last-child)::after{content:'';position:absolute;right:0;top:15%;height:70%;width:1px;background:rgba(255,255,255,0.06)}
.ms-val{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.ms-lbl{font-size:10px;color:var(--text3);margin-top:3px}

.amort-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.amort-hdr{display:grid;grid-template-columns:44px 1fr 1fr 1fr;background:var(--surface2);padding:9px 14px;gap:4px}
.amort-hdr span{font-size:10px;color:var(--text3)}
.amort-hdr span:not(:first-child){text-align:right}
.amort-row{display:grid;grid-template-columns:44px 1fr 1fr 1fr;padding:9px 14px;gap:4px;border-top:1px solid rgba(255,255,255,0.03)}
.amort-row.cur{background:rgba(200,169,110,0.06)}
.ar-p{font-size:12px;color:var(--text3)}.ar-p.c{color:var(--gold);font-weight:600}
.ar-v{font-size:12px;text-align:right;font-variant-numeric:tabular-nums}
.show-more-btn{text-align:center;padding:12px;font-size:12px;color:var(--blue);cursor:pointer;border-top:1px solid rgba(255,255,255,0.04)}

.sim-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sim-lbl{font-size:12px;color:var(--text2);width:70px;flex-shrink:0}
.sim-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.sim-unit{font-size:11px;color:var(--text3);width:30px;flex-shrink:0}
.sim-result{background:rgba(200,169,110,0.05);border:1px solid rgba(200,169,110,0.15);border-radius:12px;padding:12px 14px}
.sr-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.sr-lbl{font-size:12px;color:var(--text2)}.sr-val{font-size:13px;font-weight:600;color:var(--green);font-variant-numeric:tabular-nums}
.sr-divider{height:1px;background:rgba(255,255,255,0.05);margin:8px 0}

let currentUser = null;

// ══════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════
async function signIn() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  document.getElementById('auth-error').textContent = '';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) document.getElementById('auth-error').textContent = error.message;
}

async function signUp() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  document.getElementById('auth-error').textContent = '';
  if (pw.length < 6) { document.getElementById('auth-error').textContent = '密碼至少 6 位'; return; }
  const { error } = await db.auth.signUp({ email, password: pw });
  if (error) document.getElementById('auth-error').textContent = error.message;
  else document.getElementById('auth-error').style.color = 'var(--green)', document.getElementById('auth-error').textContent = '確認信已寄出，請查收 Email';
}

async function forgotPw() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { toast('請先填入 Email'); return; }
  await db.auth.resetPasswordForEmail(email);
  toast('重設密碼信已寄出');
}

async function signOut() {
  await db.auth.signOut();
  showPage('pg-auth');
  toast('已登出');
}

// Listen for auth state changes
db.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    currentUser = session.user;
    initApp();
  } else {
    currentUser = null;
    showPage('pg-auth');
  }
});

// ══════════════════════════════════════════════════
//  SYNC ENGINE
// ══════════════════════════════════════════════════
async function syncDown() {
  if (!currentUser) return;
  setSyncState('syncing');
  try {
    const uid = currentUser.id;
    const [r1, r2, r3, r4] = await Promise.all([
      db.from('bank_accounts').select('*').eq('user_id', uid).order('created_at'),
      db.from('inv_accounts').select('*').eq('user_id', uid).order('created_at'),
      db.from('holdings').select('*').eq('user_id', uid).order('created_at'),
      db.from('mortgages').select('*').eq('user_id', uid).order('created_at'),
    ]);
    if (r1.error) throw r1.error;
    if (r2.error) throw r2.error;
    if (r3.error) throw r3.error;
    if (r4.error) throw r4.error;
    const banks=r1.data, invAccs=r2.data, holds=r3.data, morts=r4.data;

    // map currency field: DB stores as "currency", app uses "cur"
    if (banks) {
      bankAccounts.length = 0;
      bankAccounts.push(...banks.map(b=>({
        ...b, cur: b.currency||b.cur||'TWD', rate:+b.rate, amount:+b.amount
      })));
    }
    if (invAccs) {
      invAccounts.length = 0;
      invAccs.forEach(a => {
        const stocks = (holds||[]).filter(h=>h.account_id===a.id).map(h=>({
          id:h.id, ticker:h.ticker, name:h.name,
          shares:+h.shares, cost:+h.cost, price:+h.price, chg:+h.chg
        }));
        invAccounts.push({...a, cur: a.currency||a.cur||'TWD', cash:+a.cash, stocks});
      });
    }
    if (morts) {
      mortgages.length = 0;
      mortgages.push(...morts.map(m=>({
        ...m, total:+m.total, paid:+m.paid_periods, terms:+m.total_periods, rate:+m.rate
      })));
    }
    setSyncState('ok');
    renderAll();
  } catch(e) {
    console.error('syncDown error:', e);
    setSyncState('error');
    toast('同步失敗：' + (e.message||e));
  }
}

async function upsertBank(b) {
  const row = {
    user_id: currentUser.id,
    bank: b.bank, currency: b.cur, amount: b.amount,
    rate: b.rate, period: b.period, updated_at: new Date().toISOString()
  };
  if (b.id) {
    await db.from('bank_accounts').update(row).eq('id', b.id);
  } else {
    const { data } = await db.from('bank_accounts').insert(row).select().single();
    if (data) b.id = data.id;
  }
}

async function deleteBank(id) {
  await db.from('bank_accounts').delete().eq('id', id);
}

async function upsertInvAcc(a) {
  const row = {
    user_id: currentUser.id,
    name: a.name, market: a.market,
    currency: a.cur, cash: a.cash
  };
  if (a.id && !a.id.startsWith('local_')) {
    await db.from('inv_accounts').update(row).eq('id', a.id);
  } else {
    const { data } = await db.from('inv_accounts').insert(row).select().single();
    if (data) a.id = data.id;
  }
}

async function upsertHolding(h, accountId) {
  const row = {
    user_id: currentUser.id,
    account_id: accountId,
    ticker: h.ticker, name: h.name,
    shares: h.shares, cost: h.cost,
    price: h.price, chg: h.chg,
    updated_at: new Date().toISOString()
  };
  if (h.id && !String(h.id).startsWith('local_')) {
    await db.from('holdings').update(row).eq('id', h.id);
  } else {
    const { data } = await db.from('holdings').insert(row).select().single();
    if (data) h.id = data.id;
  }
}

async function upsertMort(m) {
  const row = {
    user_id: currentUser.id,
    name: m.name, bank: m.bank,
    total: m.total, paid_periods: m.paid,
    total_periods: m.terms, rate: m.rate,
    updated_at: new Date().toISOString()
  };
  if (m.id && !String(m.id).startsWith('local_')) {
    await db.from('mortgages').update(row).eq('id', m.id);
  } else {
    const { data } = await db.from('mortgages').insert(row).select().single();
    if (data) m.id = data.id;
  }
}

function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  const bar = document.getElementById('sync-bar');
  if (!dot || !txt) return;
  dot.className = 'sync-dot' + (state==='syncing' ? ' syncing' : '');
  if (state==='ok') {
    txt.textContent = '雲端同步成功・'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    dot.style.background='var(--green)';
    if(bar){bar.style.background='rgba(110,231,183,0.08)';bar.style.borderBottom='1px solid rgba(110,231,183,0.15)'}
  }
  if (state==='syncing') {
    txt.textContent = '同步中…';
    dot.style.background='var(--blue)';
  }
  if (state==='error') {
    txt.textContent = '同步失敗';
    dot.style.background='#f87171';
    if(bar){bar.style.background='rgba(248,113,113,0.08)';bar.style.borderBottom='1px solid rgba(248,113,113,0.2)'}
  }
}

// ══════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════
const PAGES = ['pg-home','pg-bank','pg-inv','pg-mort','pg-set'];
const NAV_DEF = [{ico:'◎',lbl:'總覽',tab:0},{ico:'🏦',lbl:'存款',tab:1},{ico:'📈',lbl:'投資',tab:2},{ico:'🏠',lbl:'房貸',tab:3},{ico:'⚙️',lbl:'設定',tab:4}];

function showPage(id) {
  ['pg-auth','pg-app'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function switchTab(idx) {
  if(idx===currentTab) return;
  const from=document.getElementById(PAGES[currentTab]);
  const to=document.getElementById(PAGES[idx]);
  from.classList.add('out');
  to.classList.remove('hidden');
  setTimeout(()=>{from.classList.remove('out');from.classList.add('hidden')},350);
  currentTab=idx;
  renderAllNavs();
  renderAll();
}

function pushSub(subId) {
  document.getElementById(subId).classList.remove('hidden');
  if(subId==='sub-inv-add-stock') renderInvTargetOpts();
  if(subId==='sub-inv-add-acc') { addInvMkt='tw'; renderInvBrokerOpts(); document.getElementById('imkt-tw').classList.add('sel-blue'); document.getElementById('imkt-us').classList.remove('sel-blue'); }
}
function popSub(subId) {
  const el=document.getElementById(subId);
  el.classList.add('out');
  setTimeout(()=>{el.classList.remove('out');el.classList.add('hidden')},350);
}

function renderAllNavs() {
  ['nav-home','nav-bank','nav-inv','nav-mort','nav-set'].forEach(id=>{
    const c=document.getElementById(id); if(!c) return;
    c.innerHTML='';
    NAV_DEF.forEach(n=>{
      const active=n.tab===currentTab;
      const d=document.createElement('div'); d.className='nav-item';
      d.innerHTML=`<div class="nav-ico">${n.ico}</div><div class="nav-lbl" style="${active?'color:var(--gold)':''}">${n.lbl}</div>`;
      d.onclick=()=>switchTab(n.tab);
      c.appendChild(d);
    });
  });
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
const fmtN=n=>'NT$ '+Math.round(n).toLocaleString('zh-TW');
const fmtK=n=>n>=1e6?'NT$ '+(n/1e6).toFixed(2)+'M':'NT$ '+Math.round(n/1000)+'K';
function fmtCur(n,cur){if(cur==='USD')return 'USD '+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});if(cur==='JPY')return 'JPY '+Math.round(n).toLocaleString();return fmtN(n)}
function fmtPrice(n,cur){return cur==='USD'?'USD '+n.toFixed(2):'NT$ '+n.toFixed(1)}
function toTWD(v,cur){return cur==='USD'?v*usdRate:cur==='JPY'?v*jpyRate:v}
function bankTWD(b){return toTWD(b.amount,b.cur)}
function bankTotalTWD(){return bankAccounts.reduce((s,b)=>s+bankTWD(b),0)}
function invMV(a){return toTWD(a.stocks.reduce((s,st)=>s+st.shares*st.price,0)+a.cash,a.cur)}
function invTotalTWD(){return invAccounts.reduce((s,a)=>s+invMV(a),0)}
function mortMonthly(m){const r=m.rate/100/12;return m.total*r*Math.pow(1+r,m.terms)/(Math.pow(1+r,m.terms)-1)}
function mortRemain(m){const r=m.rate/100/12,M=mortMonthly(m);return M*(1-Math.pow(1+r,-(m.terms-m.paid)))/r}
function mortTotalRemain(){return mortgages.reduce((s,m)=>s+mortRemain(m),0)}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2200)}

let editBankIdx = -1, editBankCur = 'TWD', editBankPeriod = 'monthly';

function openEditBank(idx) {
  editBankIdx = idx;
  const b = bankAccounts[idx];
  editBankCur = b.cur;
  editBankPeriod = b.period || 'monthly';
  document.getElementById('edit-bank-name').value = b.bank;
  document.getElementById('edit-bf-amount').value = b.amount;
  document.getElementById('edit-bf-rate').value = b.rate;
  document.getElementById('edit-bank-cur-prefix').textContent = b.cur==='TWD'?'NT$':b.cur==='USD'?'USD':'JPY';
  ['TWD','USD','JPY'].forEach(c=>document.getElementById('edit-bcur-'+c.toLowerCase()).classList.remove('sel-gold'));
  document.getElementById('edit-bcur-'+b.cur.toLowerCase()).classList.add('sel-gold');
  document.querySelectorAll('#edit-period-opts .opt-btn').forEach(btn=>btn.classList.remove('sel-gold'));
  const pmap={monthly:0,quarterly:1,halfyear:2,yearly:3};
  document.querySelectorAll('#edit-period-opts .opt-btn')[pmap[editBankPeriod]||0].classList.add('sel-gold');
  document.getElementById('edit-bank-period-lbl').textContent={monthly:'月利息',quarterly:'季利息',halfyear:'半年利息',yearly:'年利息'}[editBankPeriod];
  calcEditBankPreview();
  pushSub('sub-bank-edit');
}

function selEditBankCur(cur,el) {
  editBankCur=cur;
  ['TWD','USD','JPY'].forEach(c=>document.getElementById('edit-bcur-'+c.toLowerCase()).classList.remove('sel-gold'));
  el.classList.add('sel-gold');
  document.getElementById('edit-bank-cur-prefix').textContent=cur==='TWD'?'NT$':cur==='USD'?'USD':'JPY';
  calcEditBankPreview();
}

function selEditPeriod(p,el) {
  editBankPeriod=p;
  document.querySelectorAll('#edit-period-opts .opt-btn').forEach(b=>b.classList.remove('sel-gold'));
  el.classList.add('sel-gold');
  document.getElementById('edit-bank-period-lbl').textContent={monthly:'月利息',quarterly:'季利息',halfyear:'半年利息',yearly:'年利息'}[p];
  calcEditBankPreview();
}

function calcEditBankPreview() {
  const amt=parseFloat(document.getElementById('edit-bf-amount').value)||0;
  const rate=parseFloat(document.getElementById('edit-bf-rate').value)||0;
  if(!amt||!rate){['edit-bp-period','edit-bp-year','edit-bp-5y'].forEach(id=>document.getElementById(id).textContent='—');return}
  const yi=amt*rate/100,pd={monthly:12,quarterly:4,halfyear:2,yearly:1}[editBankPeriod];
  document.getElementById('edit-bp-period').textContent='+'+fmtCur(yi/pd,editBankCur);
  document.getElementById('edit-bp-year').textContent='+'+fmtCur(yi,editBankCur);
  document.getElementById('edit-bp-5y').textContent=fmtCur(amt+yi*5,editBankCur);
}

async function saveEditBank() {
  if(editBankIdx<0)return;
  const name=document.getElementById('edit-bank-name').value.trim();
  const amt=parseFloat(document.getElementById('edit-bf-amount').value)||0;
  const rate=parseFloat(document.getElementById('edit-bf-rate').value)||0;
  if(!name||!amt||!rate){toast('請填寫完整資料');return}
  const b=bankAccounts[editBankIdx];
  b.bank=name; b.cur=editBankCur; b.amount=amt; b.rate=rate; b.period=editBankPeriod;
  await upsertBank(b);
  popSub('sub-bank-edit');
  renderBank(); renderHome();
  toast('帳戶已更新 ✓');
}

async function confirmDeleteBank() {
  if(editBankIdx<0)return;
  const b=bankAccounts[editBankIdx];
  if(!confirm('確定要刪除「'+b.bank+'」帳戶嗎？'))return;
  if(b.id) await deleteBank(b.id);
  bankAccounts.splice(editBankIdx,1);
  editBankIdx=-1;
  popSub('sub-bank-edit');
  renderBank(); renderHome();
  toast('帳戶已刪除');
}

function selBankCur(cur,el){addBankCur=cur;['TWD','USD','JPY'].forEach(c=>document.getElementById('bcur-'+c.toLowerCase()).classList.remove('sel-gold'));el.classList.add('sel-gold');document.getElementById('bank-cur-prefix').textContent=cur==='TWD'?'NT$':cur==='USD'?'USD':'JPY';calcBankPreview()}
function selPeriod(p,el){addBankPeriod=p;document.querySelectorAll('#period-opts .opt-btn').forEach(b=>b.classList.remove('sel-gold'));el.classList.add('sel-gold');document.getElementById('bank-period-lbl').textContent={monthly:'月利息',quarterly:'季利息',halfyear:'半年利息',yearly:'年利息'}[p];calcBankPreview()}
function calcBankPreview(){const amt=parseFloat(document.getElementById('bf-amount').value)||0,rate=parseFloat(document.getElementById('bf-rate').value)||0;if(!amt||!rate){['bp-period','bp-year','bp-5y'].forEach(id=>document.getElementById(id).textContent='—');return}const yi=amt*rate/100,pd={monthly:12,quarterly:4,halfyear:2,yearly:1}[addBankPeriod];document.getElementById('bp-period').textContent='+'+fmtCur(yi/pd,addBankCur);document.getElementById('bp-year').textContent='+'+fmtCur(yi,addBankCur);document.getElementById('bp-5y').textContent=fmtCur(amt+yi*5,addBankCur)}
async function submitBank(){
  const amt=parseFloat(document.getElementById('bf-amount').value)||0,rate=parseFloat(document.getElementById('bf-rate').value)||0;
  if(!amt||!rate){toast('請填寫金額與利率');return}

  const el=document.getElementById('inv-pnl-card');if(el)el.innerHTML=`<div class="card-row"><span class="cr-lbl">持有成本</span><span class="cr-val" style="color:var(--text2)">${fmtPrice(cost,a.cur)}</span></div><div class="card-row"><span class="cr-lbl">當前市值</span><span class="cr-val" style="color:var(--blue)">${fmtPrice(mv,a.cur)}</span></div><div class="card-row"><span class="cr-lbl">未實現損益</span><span class="cr-val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${fmtPrice(pnl,a.cur)}</span></div><div class="card-row"><span class="cr-lbl">累積報酬率</span><span class="cr-val ${pct>=0?'pos':'neg'}">${pct>=0?'+':''}${pct.toFixed(2)}%</span></div><div class="card-row"><span class="cr-lbl">今日損益</span><span class="cr-val ${today>=0?'pos':'neg'}">${today>=0?'+':''}${fmtPrice(today,a.cur)}</span></div><div class="card-row"><span class="cr-lbl">折台幣市值</span><span class="cr-val gold">NT$ ${Math.round(toTWD(mv,a.cur)).toLocaleString()}</span></div>`;
}
function drawSparkline(range){
  const svg=document.getElementById('sparkline-svg');if(!svg||!invAccounts[activeInvAcc])return;
  const base=invMV(invAccounts[activeInvAcc]);
  const pts=range==='1M'?30:range==='3M'?90:range==='YTD'?97:365;
  let vals=[],v=base*.88;
  for(let i=0;i<pts;i++){v+=v*(Math.random()-.44)*.025;vals.push(Math.max(v,base*.6))}
  vals[vals.length-1]=base;
  const lo=Math.min(...vals),hi=Math.max(...vals),W=300,H=60,p=4;
  const x=i=>i/(pts-1)*(W-p*2)+p, y=v=>H-((v-lo)/(hi-lo||1)*(H-p*2)+p);
  let d=`M ${x(0)} ${y(vals[0])}`;for(let i=1;i<pts;i++)d+=` L ${x(i)} ${y(vals[i])}`;
  const up=vals[pts-1]>=vals[0],col=up?'#6ee7b7':'#f87171';
  svg.innerHTML=`<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".2"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${d} L ${x(pts-1)} ${H} L ${x(0)} ${H} Z" fill="url(#sg)"/><path d="${d}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${x(pts-1)}" cy="${y(vals[pts-1])}" r="3" fill="${col}"/>`;
  const slo=document.getElementById('spark-lo');if(slo)slo.textContent=fmtN(lo);
  const shi=document.getElementById('spark-hi');if(shi)shi.textContent=fmtN(hi);
  const st2=document.getElementById('spark-title');if(st2&&invAccounts[activeInvAcc])st2.textContent=invAccounts[activeInvAcc].name+' 走勢';
}
function setRange(el,r){currentRange=r;document.querySelectorAll('.spark-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');drawSparkline(r)}
function selInvMkt(mkt,el){addInvMkt=mkt;document.getElementById('imkt-tw').classList.toggle('sel-blue',mkt==='tw');document.getElementById('imkt-us').classList.toggle('sel-blue',mkt==='us');document.getElementById('if-cash-unit').textContent=mkt==='tw'?'NT$':'USD';renderInvBrokerOpts()}
function renderInvBrokerOpts(){const list=addInvMkt==='tw'?['富邦證券','永豐金證','國泰證券','玉山證券','凱基證券']:['Interactive Brokers','嘉信理財','Firstrade','TD Ameritrade'];const c=document.getElementById('inv-broker-opts');if(!c)return;c.innerHTML='';list.forEach((b,i)=>{const el=document.createElement('div');el.className='opt-btn'+(i===0?' sel-blue':'');el.textContent=b;el.onclick=()=>{addInvBroker=b;document.querySelectorAll('#inv-broker-opts .opt-btn').forEach(x=>x.classList.remove('sel-blue'));el.classList.add('sel-blue')};c.appendChild(el)});addInvBroker=list[0]}

function renderInvTargetOpts(){const c=document.getElementById('inv-target-opts');if(!c)return;c.innerHTML='';invAccounts.forEach((a,i)=>{const el=document.createElement('div');el.className='opt-btn'+(i===activeInvAcc?' sel-blue':'');el.textContent=a.name;el.onclick=()=>{invTargetAcc=i;document.querySelectorAll('#inv-target-opts .opt-btn').forEach(x=>x.classList.remove('sel-blue'));el.classList.add('sel-blue');document.getElementById('if-cost-unit').textContent=invAccounts[i].cur==='USD'?'USD':'NT$'};c.appendChild(el)});invTargetAcc=activeInvAcc}
function lookupTicker(){const t=document.getElementById('if-ticker').value.trim().toUpperCase(),info=tickerDB[t],box=document.getElementById('ticker-box');if(info){lookedUp={...info,ticker:t};box.style.display='block';document.getElementById('ti-name').textContent=info.name;document.getElementById('ti-price').textContent=fmtPrice(info.price,info.market==='us'?'USD':'TWD');const ce=document.getElementById('ti-chg');ce.textContent=(info.chg>=0?'▲ ':'▼ ')+Math.abs(info.chg).toFixed(2)+'%';ce.style.color=info.chg>=0?'var(--green)':'var(--red)';calcStockPreview()}else{lookedUp=null;box.style.display='none';['sp-cost','sp-mkt','sp-pnl','sp-roi','sp-twd'].forEach(id=>document.getElementById(id).textContent='—')}}

async function submitStock(){if(!lookedUp){toast('請輸入有效股票代號');return}const shares=parseFloat(document.getElementById('if-shares').value)||0,cost=parseFloat(document.getElementById('if-cost').value)||0;if(!shares||!cost){toast('請填寫股數與成本');return}const acc=invAccounts[invTargetAcc];if(!acc.id||String(acc.id).startsWith('local_'))await upsertInvAcc(acc);const h={ticker:lookedUp.ticker,name:lookedUp.name,shares,cost,price:lookedUp.price,chg:lookedUp.chg};acc.stocks.push(h);await upsertHolding(h,acc.id);activeInvAcc=invTargetAcc;popSub('sub-inv-add-stock');renderInv();renderHome();toast('持股已儲存至雲端 ✓')}

// ── MORTGAGE ──
function renderMort(){renderMortTabs();renderMortHero();renderMortBreakdown();renderAmort();calcPrepay()}
function renderMortTabs(){const c=document.getElementById('mort-prop-tabs');if(!c)return;c.innerHTML='';mortgages.forEach((m,i)=>{const d=document.createElement('div');d.className='htab'+(i===activeMort?' sel-red':'');d.innerHTML=`<div class="htab-num">房產 ${i+1}</div><div class="htab-name">${m.name}</div><div class="htab-val">${fmtK(mortRemain(m))}</div>`;d.onclick=()=>{activeMort=i;amortShown=6;renderMort()};c.appendChild(d)});const add=document.createElement('div');add.className='htab-add';add.textContent='＋';add.onclick=()=>pushSub('sub-mort-add');c.appendChild(add)}
function renderMortHero(){const m=mortgages[activeMort];if(!m)return;const r=m.rate/100/12,M=mortMonthly(m),remain=mortRemain(m),intNow=remain*r,prinNow=M-intNow,pct=Math.round(m.paid/m.terms*100),yl=((m.terms-m.paid)/12).toFixed(1);const el=document.getElementById('mort-hero');if(el)el.innerHTML=`<div style="font-size:11px;color:var(--text3);margin-bottom:4px">${m.name}・${m.bank}</div><div style="font-size:12px;color:var(--text2);margin-bottom:14px">一段式利率・本息均攤</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div><div style="font-size:10px;color:var(--text3)">貸款總額</div><div style="font-size:15px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums">${fmtK(m.total)}</div></div><div><div style="font-size:10px;color:var(--text3)">剩餘本金</div><div style="font-size:15px;font-weight:700;color:var(--red);font-variant-numeric:tabular-nums">${fmtK(remain)}</div></div><div><div style="font-size:10px;color:var(--text3)">年利率</div><div style="font-size:14px;font-weight:600;color:var(--text)">${m.rate.toFixed(2)}%</div></div><div><div style="font-size:10px;color:var(--text3)">貸款期間</div><div style="font-size:14px;font-weight:600;color:var(--text)">${m.terms} 期</div></div></div><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:10px;color:var(--text3)">已還 ${pct}%</span><span style="font-size:10px;color:var(--text3)">剩餘 ${yl} 年・第 ${m.paid} 期</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,#f87171,#c84b4b)"></div></div><div class="mort-stats"><div class="ms-cell"><div class="ms-val" style="font-variant-numeric:tabular-nums">${Math.round(M).toLocaleString()}</div><div class="ms-lbl">月付金額</div></div><div class="ms-cell"><div class="ms-val" style="color:var(--green);font-variant-numeric:tabular-nums">${Math.round(prinNow).toLocaleString()}</div><div class="ms-lbl">本月本金↓</div></div><div class="ms-cell"><div class="ms-val" style="color:var(--red);font-variant-numeric:tabular-nums">${Math.round(intNow).toLocaleString()}</div><div class="ms-lbl">本月利息</div></div></div>`}
function renderMortBreakdown(){const m=mortgages[activeMort];if(!m)return;const r=m.rate/100/12,M=mortMonthly(m),remain=mortRemain(m),intNow=remain*r,prinNow=M-intNow;const el=document.getElementById('mort-breakdown');if(el)el.innerHTML=`<div class="card-row"><span class="cr-lbl">月付總額</span><span class="cr-val gold">${fmtN(M)}</span></div><div class="card-row"><span class="cr-lbl">↳ 本金部分</span><span class="cr-val pos">${fmtN(prinNow)}</span></div><div class="card-row"><span class="cr-lbl">↳ 利息部分</span><span class="cr-val neg">${fmtN(intNow)}</span></div><div class="card-row"><span class="cr-lbl">利息佔比</span><span class="cr-val">${Math.round(intNow/M*100)}%</span></div><div class="card-row"><span class="cr-lbl">已還期數</span><span class="cr-val">${m.paid} 期</span></div><div class="card-row"><span class="cr-lbl">剩餘期數</span><span class="cr-val">${m.terms-m.paid} 期</span></div>`}
function renderAmort(){const m=mortgages[activeMort];if(!m)return;const r=m.rate/100/12,M=mortMonthly(m);let bal=m.total,rows=[];for(let i=1;i<=m.terms;i++){const ii=bal*r,pp=M-ii;bal-=pp;rows.push({p:i,prin:pp,int:ii,bal:Math.max(0,bal)})}const body=document.getElementById('amort-body');if(!body)return;body.innerHTML='';rows.slice(0,amortShown).forEach(row=>{const isCur=row.p===m.paid+1;const d=document.createElement('div');d.className='amort-row'+(isCur?' cur':'');d.innerHTML=`<span class="ar-p ${isCur?'c':''}">${row.p}${isCur?' ←':''}</span><span class="ar-v" style="color:var(--green);text-align:right">${Math.round(row.prin).toLocaleString()}</span><span class="ar-v" style="color:var(--red);text-align:right">${Math.round(row.int).toLocaleString()}</span><span class="ar-v" style="color:var(--text);text-align:right">${Math.round(row.bal/1000)}K</span>`;body.appendChild(d)});const btn=document.getElementById('amort-more');if(btn){if(amortShown>=rows.length)btn.style.display='none';else{btn.style.display='block';btn.textContent=`顯示更多（剩 ${rows.length-amortShown} 期）↓`}}}
function showMoreAmort(){amortShown+=12;renderAmort()}
function calcPrepay(){const m=mortgages[activeMort];if(!m)return;const extra=parseFloat(document.getElementById('prepay-input').value)||0,r=m.rate/100/12,M=mortMonthly(m),normalLeft=m.terms-m.paid;let remain=mortRemain(m),bal=remain,months=0;while(bal>0&&months<normalLeft){const ii=bal*r,pp=Math.min(M-ii+extra,bal);bal-=pp;months++}const saved=normalLeft-months;let intN=0,b3=remain;for(let i=0;i<normalLeft;i++){const ii=b3*r;intN+=ii;b3-=(M-ii)}let intE=0,b4=remain;for(let i=0;i<months;i++){const ii=b4*r;intE+=ii;b4-=Math.min(M-ii+extra,b4)}const savedInt=Math.max(0,intN-intE);const fin=new Date();fin.setMonth(fin.getMonth()+months);const py=document.getElementById('pr-years');if(py)py.textContent=saved>0?`縮短 ${Math.floor(saved/12)} 年 ${saved%12} 個月`:'影響不大';const ps=document.getElementById('pr-save');if(ps)ps.textContent=savedInt>0?fmtN(savedInt):'—';const pd=document.getElementById('pr-date');if(pd)pd.textContent=fin.getFullYear()+' 年 '+(fin.getMonth()+1)+' 月 還清'}
function selMortBank(el,bank){addMortBank=bank;document.querySelectorAll('#mort-bank-opts .opt-btn').forEach(b=>b.classList.remove('sel-red'));el.classList.add('sel-red')}
function calcMortPreview(){const total=parseFloat(document.getElementById('mf-total').value)||0,paid=parseInt(document.getElementById('mf-paid').value)||0,terms=parseInt(document.getElementById('mf-terms').value)||0,rate=parseFloat(document.getElementById('mf-rate').value)||0;if(!total||!terms||!rate){['mp-monthly','mp-prin','mp-int','mp-remain'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='—'});return}const r=rate/100/12,M=total*r*Math.pow(1+r,terms)/(Math.pow(1+r,terms)-1),remain=M*(1-Math.pow(1+r,-(terms-paid)))/r,intNow=remain*r,prinNow=M-intNow;const mm=document.getElementById('mp-monthly');if(mm)mm.textContent=fmtN(M);const mp=document.getElementById('mp-prin');if(mp)mp.textContent='+'+fmtN(prinNow);const mi=document.getElementById('mp-int');if(mi)mi.textContent=fmtN(intNow);const mr=document.getElementById('mp-remain');if(mr)mr.textContent=fmtN(remain)}
async function submitMort(){const name=document.getElementById('mf-name').value.trim()||'新房產',total=parseFloat(document.getElementById('mf-total').value)||0,paid=parseInt(document.getElementById('mf-paid').value)||0,terms=parseInt(document.getElementById('mf-terms').value)||0,rate=parseFloat(document.getElementById('mf-rate').value)||0;if(!total||!terms||!rate){toast('請填寫完整貸款資訊');return}const m={name,bank:addMortBank,total,paid,terms,rate};mortgages.push(m);await upsertMort(m);activeMort=mortgages.length-1;amortShown=6;popSub('sub-mort-add');renderMort();renderHome();toast('房貸已儲存至雲端 ✓')}

// ── REFRESH ──
async function fetchRealRates() {
  try {
    // Use exchangerate-api (supports CORS)
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.result !== 'success') throw new Error('API error');
    const prevUsd = usdRate, prevJpy = jpyRate;
    const usdJpy = data.rates.JPY;
    usdRate = parseFloat(data.rates.TWD.toFixed(2));
    jpyRate = parseFloat((usdRate / usdJpy).toFixed(4));
    const du = usdRate - prevUsd, dj = jpyRate - prevJpy;
    const ru=document.getElementById('r-usd');if(ru)ru.textContent=usdRate.toFixed(2);
    const rj=document.getElementById('r-jpy');if(rj)rj.textContent=jpyRate.toFixed(3);
    const rju=document.getElementById('r-jpyusd');if(rju)rju.textContent=usdJpy.toFixed(1);
    const rcu=document.getElementById('rc-usd');if(rcu){rcu.textContent=(du>=0?'▲ ':'▼ ')+Math.abs(du).toFixed(2);rcu.style.color=du>=0?'var(--green)':'var(--red)'}
    const rcj=document.getElementById('rc-jpy');if(rcj){rcj.textContent=(dj>=0?'▲ ':'▼ ')+Math.abs(dj).toFixed(4);rcj.style.color=dj>=0?'var(--green)':'var(--red)'}
    const ibu=document.getElementById('inv-badge-usd');if(ibu)ibu.textContent='USD/TWD '+usdRate.toFixed(2);
    const now=new Date(),ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const hut=document.getElementById('home-update-time');if(hut)hut.textContent='即時匯率已更新・'+ts;
    const iut=document.getElementById('inv-update-time');if(iut)iut.textContent='即時匯率已更新・'+ts;
    return true;
  } catch(e) {
    console.warn('Rate fetch failed, using cached rates', e);
    return false;
  }
}

async function refreshAll(){
  const btn=document.querySelector('#pg-home .refresh-btn');
  if(btn)btn.textContent='更新中…';
  await fetchRealRates();
  renderAll();
  if(btn)btn.textContent='立即刷新';
  toast('✓ 匯率已更新（即時資料）');
}
async function refreshPrices(){
  const btn=document.querySelector('#pg-inv .refresh-btn');
  if(btn)btn.textContent='更新中…';
  await fetchRealRates();
  renderInv();
  if(btn)btn.textContent='刷新行情';
  toast('✓ 匯率已更新（即時資料）');
}

// ── EXPORT / IMPORT ──
function exportData(){const data={bank:bankAccounts,inv:invAccounts,mort:mortgages,exported:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='asset_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('備份已匯出')}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async ev=>{try{const data=JSON.parse(ev.target.result);if(data.bank){bankAccounts.length=0;bankAccounts.push(...data.bank);for(const b of bankAccounts)await upsertBank(b)}if(data.inv){invAccounts.length=0;invAccounts.push(...data.inv);for(const a of invAccounts){await upsertInvAcc(a);for(const h of a.stocks)await upsertHolding(h,a.id)}}if(data.mort){mortgages.length=0;mortgages.push(...data.mort);for(const m of mortgages)await upsertMort(m)}renderAll();toast('資料已匯入並同步至雲端 ✓')}catch(err){toast('匯入失敗：格式錯誤')}};reader.readAsText(file)}

function tick(){const now=new Date(),s=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');document.querySelectorAll('.st').forEach(e=>e.textContent=s);const h=now.getHours(),g=document.getElementById('greeting');if(g)g.textContent=h<12?'早安，':h<18?'午安，':'晚安，'}
tick();setInterval(tick,1000);

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}))}
